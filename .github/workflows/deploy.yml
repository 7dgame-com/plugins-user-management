name: Deploy

on:
  push:
    branches: [main, develop, publish]

env:
  REGISTRY: hkccr.ccs.tencentyun.com
  IMAGE: hkccr.ccs.tencentyun.com/plugins/user-manager

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry with retry
        env:
          TENCENT_REGISTRY_USER: ${{ secrets.TENCENT_REGISTRY_USER }}
          TENCENT_REGISTRY_PASSWORD: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          max_attempts=5
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            if printf '%s' "$TENCENT_REGISTRY_PASSWORD" | docker login "$REGISTRY" --username "$TENCENT_REGISTRY_USER" --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}/${max_attempts}."
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Docker login failed after ${max_attempts} attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Docker login failed on attempt ${attempt}/${max_attempts}. Retrying in ${sleep_seconds}s..."
            docker logout "$REGISTRY" || true
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=publish,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/publish' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
