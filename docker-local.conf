server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # /api/ 前缀代理（axios baseURL 使用此路径）
    # /api/v1/plugin-user/... → http://host.docker.internal:8081/v1/plugin-user/...
    location /api/ {
        proxy_pass http://host.docker.internal:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Upstream-Addr $upstream_addr always;
    }

    # 兼容旧路径（无 /api/ 前缀）
    location /v1/plugin-user/ {
        proxy_pass http://host.docker.internal:8081/v1/plugin-user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Upstream-Addr $upstream_addr always;
    }

    location /v1/plugin/ {
        proxy_pass http://host.docker.internal:8081/v1/plugin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Upstream-Addr $upstream_addr always;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /debug-env {
        access_log off;
        default_type application/json;
        return 200 '{"note":"docker-local mode","APP_API_1_URL":"http://host.docker.internal:8081","hostname":"local"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
